spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.opengauss.Driver
    url: jdbc:opengauss://UAT_HOST:5432/bosz?currentSchema=as_agent&characterEncoding=UTF-8
    username: UAT_USER
    password: UAT_PASSWORD
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true

logging:
  level:
    com.suzhou.bank: INFO
